name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["*"]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l cmd internal)"
      - run: go vet ./...
      - run: go test ./...
      - run: CGO_ENABLED=0 go build ./...

  docker:
    name: Docker image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Build the image on every event, but only publish on pushes to main and
      # on tag/release events. PRs build only, to validate the Dockerfile.
      - name: Compute image tags
        id: meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "tags=$IMAGE:pr" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "tags=$IMAGE:${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "tags=$IMAGE:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            VERSION="$(date -u +'%Y%m%d%H%M%S')"
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "tags=$IMAGE:${VERSION},$IMAGE:latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.meta.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
